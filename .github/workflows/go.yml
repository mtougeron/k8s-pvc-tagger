name: Go

on:
  push:
    branches: [ main ]
    paths:
      - go.*
      - '**.go'
  pull_request:
    branches: [ main ]
    paths:
      - go.*
      - '**.go'

jobs:

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:

    - name: Set up Go 1.x
      uses: actions/setup-go@v4
      with:
        go-version: ^1.25
      id: go

    - name: Check out code into the Go module directory
      uses: actions/checkout@v4

    - name: Build
      run: go build -v .

    - name: Test
      run: go test -v .
